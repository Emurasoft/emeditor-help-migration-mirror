name = "emeditor-help-migration-mirror"
main = "build/index.js"
compatibility_date = "2026-04-07"

[build]
command = "cargo install -q \"worker-build@^0.7\" && worker-build --release"

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1